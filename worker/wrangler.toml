name = "dipdesigns"
main = "index.js"
compatibility_date = "2026-06-11"

[placement]
mode = "smart"

[[r2_buckets]]
binding = "THUMBS"
bucket_name = "dipdesigns-thumbs"

[[kv_namespaces]]
binding = "WEBHOOKS_KV"
id = "5b35c96a0bdd418685bfb6ce68884acd"

[[d1_databases]]
binding = "DB"
database_name = "dipdesigns-db"
database_id = "e36e0a43-72c1-447c-98a8-37ebc6acfbbb"

[[durable_objects.bindings]]
name = "SESSION_HUB"
class_name = "SessionHub"

[[durable_objects.bindings]]
name = "CREDIT_LEDGER"
class_name = "CreditLedger"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionHub"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["CreditLedger"]

[ai]
binding = "AI"

[assets]
directory = "./public"

[vars]
CREDIT_COST = "1"
FREE_DAILY_LIMIT = "3"

[env.production]
vars = { ENVIRONMENT = "production" }
