name = "webhooks-email"
main = "index.js"
compatibility_date = "2026-01-01"

[placement]
mode = "smart"

# KV for persisting VFS session state (OPTIONAL -- the SSE hub works without it).
# An empty id makes `wrangler deploy` FAIL, so this stays commented out until you
# create the namespace and paste the real id:
#   wrangler kv namespace create "WEBHOOKS_KV"
# Then uncomment the three lines below and set id.
# [[kv_namespaces]]
# binding = "WEBHOOKS_KV"
# id = "PASTE_REAL_KV_NAMESPACE_ID_HERE"

# Durable Object for real-time SSE broadcast hub
[[durable_objects.bindings]]
name = "SESSION_HUB"
class_name = "SessionHub"

[[migrations]]
tag = "v1"
new_classes = ["SessionHub"]

# NOTE: removed the [[d1_databases]] block -- the worker never references env.DB and
# an empty database_id breaks `wrangler deploy`. Re-add it with a real database_id
# only when you actually wire D1.

[env.production]
vars = { ENVIRONMENT = "production" }
